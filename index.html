<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Visor GeoServer Profesional — Servicios OGC WMS/WFS — ARTECLAB" />
  <title>Curso GeoServer Profesional</title>

  <!-- OpenLayers 9 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css" />
  <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>

  <!-- Estilos propios -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- =========================================================
       BANNER SUPERIOR
       ========================================================= -->
  <header id="banner" role="banner">
    <div class="banner-brand">
      <!-- Logo / icono -->
      <div class="banner-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#F4A021" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10A15.3 15.3 0 0112 2z"/>
          <path d="M8 12a18 18 0 001 5"/>
        </svg>
      </div>
      <div class="banner-titles">
        <span class="banner-title">Curso <span>GeoServer</span> Profesional</span>
        <span class="banner-subtitle">Servicios OGC &nbsp;·&nbsp; WMS &amp; WFS &nbsp;·&nbsp; Bolivia</span>
      </div>
    </div>

    <div class="banner-meta">
      <span class="banner-badge">ARTECLAB</span>
    </div>
  </header>

  <!-- =========================================================
       LAYOUT PRINCIPAL
       ========================================================= -->
  <div id="app">

    <!-- =====================================================
         SIDEBAR — Panel de capas
         ===================================================== -->
    <aside id="sidebar" role="complementary" aria-label="Panel de capas">

      <!-- Cabecera del panel -->
      <div class="sidebar-header">
        <div class="sidebar-header-row">
          <span class="sidebar-title">Mapa base</span>
        </div>
        <!-- Selector de mapa base (se llena dinámicamente) -->
        <div class="basemap-selector" id="basemap-selector"></div>
      </div>

      <!-- Sección de capas -->
      <div class="sidebar-header" style="padding-top:10px;padding-bottom:10px;flex-shrink:0;">
        <span class="sidebar-title">Capas WMS</span>
      </div>

      <!-- Lista de capas (se llena dinámicamente desde data.json) -->
      <div class="layers-container" id="layers-container" role="list"
           aria-label="Capas disponibles">
        <!-- Las tarjetas de capa se generan en scripts.js -->
      </div>

    </aside>

    <!-- =====================================================
         CONTENEDOR DEL MAPA
         ===================================================== -->
    <main id="map-container" role="main">

      <!-- Overlay para cerrar sidebar en móvil -->
      <div id="sidebar-overlay" aria-hidden="true"></div>

      <!-- Mapa OpenLayers -->
      <div id="map" role="application" aria-label="Mapa interactivo"></div>

      <!-- Botón toggle sidebar (sobre el mapa) -->
      <button id="sidebar-toggle" title="Mostrar/ocultar panel de capas"
              aria-label="Mostrar/ocultar panel de capas">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="4" x2="14" y2="4"/>
          <line x1="2" y1="8" x2="14" y2="8"/>
          <line x1="2" y1="12" x2="8" y2="12"/>
        </svg>
      </button>

      <!-- ================================================
           Controles de mapa (zoom, extent)
           ================================================ -->
      <div class="map-controls" role="toolbar" aria-label="Controles del mapa">

        <!-- Zoom In -->
        <button class="ctrl-btn" id="btn-zoom-in"
                title="Acercar" aria-label="Acercar">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round">
            <circle cx="7" cy="7" r="5.5"/>
            <line x1="11" y1="11" x2="14.5" y2="14.5"/>
            <line x1="7" y1="4.5" x2="7" y2="9.5"/>
            <line x1="4.5" y1="7" x2="9.5" y2="7"/>
          </svg>
        </button>

        <!-- Zoom Out -->
        <button class="ctrl-btn" id="btn-zoom-out"
                title="Alejar" aria-label="Alejar">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round">
            <circle cx="7" cy="7" r="5.5"/>
            <line x1="11" y1="11" x2="14.5" y2="14.5"/>
            <line x1="4.5" y1="7" x2="9.5" y2="7"/>
          </svg>
        </button>

        <!-- Divisor -->
        <div class="ctrl-divider"></div>

        <!-- Zoom a extensión inicial -->
        <button class="ctrl-btn" id="btn-full-extent"
                title="Volver a Bolivia" aria-label="Volver a extensión inicial">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="5" height="5" rx="1"/>
            <rect x="9" y="2" width="5" height="5" rx="1"/>
            <rect x="2" y="9" width="5" height="5" rx="1"/>
            <rect x="9" y="9" width="5" height="5" rx="1"/>
          </svg>
        </button>

      </div>

      <!-- ================================================
           Footer del mapa — coordenadas y CRS
           ================================================ -->
      <div id="map-footer" role="status" aria-live="polite">
        <span class="footer-coords" id="footer-coords">
          Lon: <span>—</span> &nbsp; Lat: <span>—</span>
        </span>
        <span class="footer-crs">WGS 84 / EPSG:4326</span>
      </div>

    </main>

  </div><!-- /#app -->

  <!-- =========================================================
       Toast / Notificaciones
       ========================================================= -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Scripts propios -->
  <script src="scripts.js"></script>

</body>
</html>
